{% extends "base.html" %}
{% block title %}Browse Jobs — APPLiED{% endblock %}

{% block extra_css %}
<style>
  .jobs-toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .jobs-toolbar input {
    flex: 1;
    min-width: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .jobs-toolbar input:focus { border-color: var(--accent); }
  .jobs-toolbar input::placeholder { color: var(--muted); }

  .jobs-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .job-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 16px;
    align-items: start;
    transition: border-color 0.15s;
    animation: fadeIn 0.2s ease both;
  }

  .job-card:hover { border-color: var(--accent); }

  .job-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
  }

  .job-company {
    font-size: 0.75rem;
    color: var(--accent2);
    letter-spacing: 0.04em;
    margin-top: 2px;
  }

  .job-meta {
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .job-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
  }

  .job-actions a, .job-actions button {
    font-size: 0.7rem;
    padding: 5px 11px;
    border-radius: 5px;
  }
</style>
{% endblock %}

{% block content %}
<div class="container">
  <div>
    <div class="section-label">job listings — GET /jobs</div>
  </div>

  <div class="jobs-toolbar">
    <input id="search-input" type="text" placeholder="filter by title, company, location, category..." oninput="filterJobs()" />
    <button class="btn" onclick="fetchJobs()">load jobs</button>
    <button class="btn secondary" onclick="ingestJobs()">ingest new</button>
    <span id="jobs-status" style="font-size:0.75rem; color:var(--muted);"></span>
  </div>

  <div class="jobs-grid" id="jobs-grid">
    <div class="empty-state">press "load jobs" to pull listings from the database</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let allJobs = [];

  async function fetchJobs() {
    const grid   = document.getElementById('jobs-grid');
    const status = document.getElementById('jobs-status');
    grid.innerHTML = '<div class="empty-state">loading...</div>';
    status.textContent = '';

    try {
      const res  = await fetch('/jobs?limit=100');
      const data = await res.json();
      allJobs = Array.isArray(data) ? data : (data.jobs || data.results || []);

      if (!allJobs.length) {
        grid.innerHTML = '<div class="empty-state">no jobs found — try "ingest new" to pull from Remotive</div>';
        return;
      }

      status.textContent = allJobs.length + ' listings';
      renderJobs(allJobs);
    } catch {
      grid.innerHTML = '<div class="empty-state" style="color:var(--danger)">could not reach /jobs</div>';
    }
  }

  async function ingestJobs() {
    toast('fetching from Remotive...');
    try {
      const res  = await fetch('/jobs/ingest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ limit: 50 })
      });
      const data = await res.json();
      if (data.status === 'success') {
        toast(`saved ${data.inserted} new jobs (${data.received} fetched)`);
        fetchJobs();
      } else {
        toast(data.message || 'ingest failed', true);
      }
    } catch {
      toast('could not reach /jobs/ingest', true);
    }
  }

  function filterJobs() {
    const q = document.getElementById('search-input').value.toLowerCase();
    if (!allJobs.length) return;
    const filtered = q
      ? allJobs.filter(j =>
          (j.title    || '').toLowerCase().includes(q) ||
          (j.company  || '').toLowerCase().includes(q) ||
          (j.location || '').toLowerCase().includes(q) ||
          (j.category || '').toLowerCase().includes(q)
        )
      : allJobs;
    document.getElementById('jobs-status').textContent = filtered.length + ' listings';
    renderJobs(filtered);
  }

  function buildTailorUrl(job) {
    const p = new URLSearchParams();
    if (job.title)   p.set('title',   job.title);
    if (job.company) p.set('company', job.company);
    return '/tailor?' + p.toString();
  }

  function renderJobs(jobs) {
    const grid = document.getElementById('jobs-grid');
    grid.innerHTML = '';
    jobs.forEach((job, i) => {
      const card = document.createElement('div');
      card.className = 'job-card';
      card.style.animationDelay = (i * 0.03) + 's';

      const tailorUrl = buildTailorUrl(job);

      card.innerHTML = `
        <div>
          <div class="job-title">${escHtml(job.title || 'Untitled')}</div>
          <div class="job-company">${escHtml(job.company || '')}</div>
          <div class="job-meta">
            ${job.location ? `<span>${escHtml(job.location)}</span>` : ''}
            ${job.category ? `<span>${escHtml(job.category)}</span>` : ''}
            ${job.source   ? `<span>${escHtml(job.source)}</span>`   : ''}
          </div>
        </div>
        <div class="job-actions">
          <a class="btn" href="${escHtml(tailorUrl)}">tailor →</a>
          ${job.url
            ? `<a class="btn ghost" href="${escHtml(job.url)}" target="_blank" rel="noopener">view listing</a>`
            : ''}
        </div>
      `;
      grid.appendChild(card);
    });
  }
</script>
{% endblock %}
