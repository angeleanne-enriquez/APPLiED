<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}APPLiED{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent2: #4ee8b0;
      --text: #e8e8f0;
      --muted: #666680;
      --danger: #f76a6a;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    nav {
      margin-left: auto;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .tab {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
      text-decoration: none;
      display: inline-block;
    }

    .tab:hover { color: var(--text); border-color: var(--border); }

    .tab.active {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .tab.secondary {
      font-size: 0.72rem;
      padding: 5px 12px;
    }

    nav .divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 4px;
    }

    main {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── BUTTONS ─── */
    .btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 12px 22px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.03em;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn.secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn.ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn.ghost:hover { border-color: var(--accent); color: var(--text); }

    /* ─── FORMS ─── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 4px;
    }

    .form-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: -12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field input,
    .field textarea,
    .field select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
      width: 100%;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus { border-color: var(--accent); }

    .field input::placeholder,
    .field textarea::placeholder { color: var(--muted); }

    .field select option { background: var(--surface2); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ─── MISC ─── */
    .section-label {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: -8px;
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 0.82rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .tag {
      font-size: 0.68rem;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
      height: fit-content;
    }

    .tag.accent { border-color: var(--accent); color: var(--accent); }
    .tag.green  { border-color: var(--accent2); color: var(--accent2); }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface2);
      border: 1px solid var(--accent2);
      color: var(--accent2);
      font-size: 0.78rem;
      padding: 12px 20px;
      border-radius: 8px;
      z-index: 999;
      animation: slideUp 0.2s ease;
      letter-spacing: 0.03em;
    }

    .toast.error { border-color: var(--danger); color: var(--danger); }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<header>
  <a class="logo" href="/">APP<span>L</span>iED</a>
  <nav>
    <a class="tab {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">dashboard</a>
    <a class="tab {% if request.path == '/browse' %}active{% endif %}" href="/browse">jobs</a>
    <a class="tab {% if request.path == '/tailor' %}active{% endif %}" href="/tailor">tailor</a>
    <a class="tab {% if request.path == '/chat' %}active{% endif %}" href="/chat">agent</a>
    <a class="tab {% if request.path == '/profile' %}active{% endif %}" href="/profile">profile</a>
    <div class="divider"></div>
    <a class="tab secondary {% if request.path == '/settings' %}active{% endif %}" href="/settings">settings</a>
    <a class="tab secondary {% if request.path == '/about' %}active{% endif %}" href="/about">about</a>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<script>
  function toast(msg, isError = false) {
    const el = document.createElement('div');
    el.className = 'toast' + (isError ? ' error' : '');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
{% block scripts %}{% endblock %}

</body>
</html>
