{% extends "base.html" %}
{% block title %}Login — APPLiED{% endblock %}

{% block extra_css %}
<style>
  .auth-wrapper {
    min-height: calc(100vh - 65px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    animation: fadeIn 0.25s ease;
  }

  .auth-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
  }

  .auth-tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 9px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .auth-tab.active {
    background: var(--accent);
    color: #fff;
  }

  .auth-form { display: flex; flex-direction: column; gap: 14px; }
  .auth-form.hidden { display: none; }

  .auth-divider {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.06em;
  }

  .auth-footer {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
  }

  .auth-footer a { color: var(--accent); text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div>
      <div class="form-title">welcome back</div>
      <div class="form-subtitle" style="display:flex;align-items:center;gap:6px;margin-top:6px;">
        <span style="background:var(--surface2);border:1px solid var(--accent2);color:var(--accent2);font-size:0.65rem;padding:2px 7px;border-radius:4px;letter-spacing:0.06em;">dev mode</span>
        <span>any credentials accepted</span>
      </div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login', this)">login</button>
      <button class="auth-tab" onclick="switchAuthTab('signup', this)">sign up</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form" id="form-login" onsubmit="handleLogin(event)">
      <div class="field">
        <label>email</label>
        <input type="email" id="login-email" placeholder="ada@example.com" />
      </div>
      <div class="field">
        <label>password</label>
        <input type="password" id="login-password" placeholder="anything works" />
      </div>
      <button class="btn" type="submit">sign in</button>
      <div class="auth-divider">— or —</div>
      <button class="btn secondary" type="button" onclick="continueAsGuest()">continue as guest</button>
    </form>

    <!-- Signup Form -->
    <form class="auth-form hidden" id="form-signup" onsubmit="handleSignup(event)">
      <div class="form-row">
        <div class="field">
          <label>first name</label>
          <input type="text" id="signup-first" placeholder="Ada" />
        </div>
        <div class="field">
          <label>last name</label>
          <input type="text" id="signup-last" placeholder="Lovelace" />
        </div>
      </div>
      <div class="field">
        <label>email</label>
        <input type="email" id="signup-email" placeholder="ada@example.com" />
      </div>
      <div class="field">
        <label>password</label>
        <input type="password" id="signup-password" placeholder="anything works" />
      </div>
      <button class="btn" type="submit">create account</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function switchAuthTab(name, btn) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('form-login').classList.toggle('hidden', name !== 'login');
    document.getElementById('form-signup').classList.toggle('hidden', name !== 'signup');
  }

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const name = email ? email.split('@')[0] : 'user';
    localStorage.setItem('applied_user', JSON.stringify({ name, email, isGuest: false }));
    window.location.href = '/dashboard';
  }

  function handleSignup(e) {
    e.preventDefault();
    const first = document.getElementById('signup-first').value.trim() || 'user';
    const last = document.getElementById('signup-last').value.trim() || '';
    const email = document.getElementById('signup-email').value.trim();
    const name = last ? `${first} ${last}` : first;
    localStorage.setItem('applied_user', JSON.stringify({ name, email, isGuest: false }));
    window.location.href = '/onboarding';
  }

  function continueAsGuest() {
    localStorage.setItem('applied_user', JSON.stringify({ name: 'guest', email: '', isGuest: true }));
    window.location.href = '/dashboard';
  }
</script>
{% endblock %}
