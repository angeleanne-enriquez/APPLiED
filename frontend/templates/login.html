{% extends "base.html" %}
{% block title %}Login — APPLiED{% endblock %}

{% block extra_css %}
<style>
  .auth-wrapper {
    min-height: calc(100vh - 65px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    animation: fadeIn 0.25s ease;
  }

  .auth-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
  }

  .auth-tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 9px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .auth-tab.active {
    background: var(--accent);
    color: #fff;
  }

  .auth-form { display: flex; flex-direction: column; gap: 14px; }
  .auth-form.hidden { display: none; }

  .auth-divider {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.06em;
  }

  .auth-footer {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
  }

  .auth-footer a { color: var(--accent); text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div>
      <div class="form-title">welcome back</div>
      <div class="form-subtitle" style="margin-top:6px;">sign in to your account</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login', this)">login</button>
      <button class="auth-tab" onclick="switchAuthTab('signup', this)">sign up</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form" id="form-login" onsubmit="handleLogin(event)">
      <div class="field">
        <label>email</label>
        <input type="email" id="login-email" placeholder="ada@example.com" autocomplete="email" />
        <span class="field-error" id="err-login-email"></span>
      </div>
      <div class="field">
        <label>password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        <span class="field-error" id="err-login-password"></span>
      </div>
      <span class="field-error" id="err-login-global" style="font-size:0.75rem;"></span>
      <button class="btn" type="submit" id="login-btn">sign in</button>
      <div class="auth-divider">— or —</div>
      <button class="btn secondary" type="button" onclick="continueAsGuest()">continue as guest</button>
    </form>

    <!-- Signup Form -->
    <form class="auth-form hidden" id="form-signup" onsubmit="handleSignup(event)">
      <div class="form-row">
        <div class="field">
          <label>first name</label>
          <input type="text" id="signup-first" placeholder="Ada" autocomplete="given-name" />
        </div>
        <div class="field">
          <label>last name</label>
          <input type="text" id="signup-last" placeholder="Lovelace" autocomplete="family-name" />
        </div>
      </div>
      <div class="field">
        <label>email</label>
        <input type="email" id="signup-email" placeholder="ada@example.com" autocomplete="email" />
        <span class="field-error" id="err-signup-email"></span>
      </div>
      <div class="field">
        <label>password <span style="color:var(--muted);font-size:0.65rem;">(min 6 characters)</span></label>
        <input type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password" />
        <span class="field-error" id="err-signup-password"></span>
      </div>
      <span class="field-error" id="err-signup-global" style="font-size:0.75rem;"></span>
      <button class="btn" type="submit" id="signup-btn">create account</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // already logged in? skip the login page
  (function() {
    try {
      const u = JSON.parse(localStorage.getItem('applied_user') || 'null');
      if (u && u.user_id && !u.isGuest) window.location.replace('/dashboard');
    } catch {}
  })();

  function switchAuthTab(name, btn) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('form-login').classList.toggle('hidden', name !== 'login');
    document.getElementById('form-signup').classList.toggle('hidden', name !== 'signup');
  }

  function saveUserLocally(data) {
    const first = data.first_name || '';
    const last  = data.last_name  || '';
    const name  = [first, last].filter(Boolean).join(' ') || data.email.split('@')[0];
    localStorage.setItem('applied_user', JSON.stringify({
      name, first, last,
      email:   data.email,
      user_id: data.user_id,
      isGuest: false,
    }));
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn      = document.getElementById('login-btn');
    const errEl    = document.getElementById('err-login-global');
    errEl.classList.remove('visible');

    if (!email) { fieldError('login-email', 'email is required'); return; }
    if (!password) { fieldError('login-password', 'password is required'); return; }

    btn.disabled = true;
    btn.textContent = 'signing in…';

    try {
      const res  = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok || data.status !== 'success') {
        errEl.textContent = data.message || 'login failed';
        errEl.classList.add('visible');
        return;
      }

      saveUserLocally(data);
      window.location.href = '/dashboard';
    } catch {
      errEl.textContent = 'could not reach the server — is the app running?';
      errEl.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = 'sign in';
    }
  }

  async function handleSignup(e) {
    e.preventDefault();
    const first    = document.getElementById('signup-first').value.trim();
    const last     = document.getElementById('signup-last').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const btn      = document.getElementById('signup-btn');
    const errEl    = document.getElementById('err-signup-global');
    errEl.classList.remove('visible');

    if (!email || !isValidEmail(email)) {
      fieldError('signup-email', 'enter a valid email address');
      return;
    }
    if (!password || password.length < 6) {
      fieldError('signup-password', 'password must be at least 6 characters');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'creating account…';

    try {
      const res  = await fetch('/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, first_name: first, last_name: last }),
      });
      const data = await res.json();

      if (!res.ok || data.status !== 'success') {
        errEl.textContent = data.message || 'signup failed';
        errEl.classList.add('visible');
        return;
      }

      saveUserLocally(data);
      window.location.href = '/onboarding';
    } catch {
      errEl.textContent = 'could not reach the server — is the app running?';
      errEl.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = 'create account';
    }
  }

  function continueAsGuest() {
    localStorage.setItem('applied_user', JSON.stringify({ name: 'guest', email: '', isGuest: true }));
    window.location.href = '/dashboard';
  }
</script>
{% endblock %}
