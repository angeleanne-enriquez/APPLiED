<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}APPLiED{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent2: #4ee8b0;
      --text: #e8e8f0;
      --muted: #666680;
      --danger: #f76a6a;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    header {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    nav {
      margin-left: auto;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    /* ─── NAV TABS ─── */
    .tab {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
      text-decoration: none;
      display: inline-block;
    }

    .tab:hover { color: var(--text); border-color: var(--border); }

    .tab.active {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--accent);
    }

    nav .divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 6px;
    }

    /* ─── USER DROPDOWN ─── */
    .nav-user-wrapper {
      position: relative;
    }

    .nav-user-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 5px 10px 5px 5px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Mono', monospace;
    }

    .nav-user-btn:hover,
    .nav-user-btn.open {
      background: var(--surface2);
      border-color: var(--border);
    }

    .nav-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.66rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      letter-spacing: 0;
      flex-shrink: 0;
    }

    .nav-user-btn.open .nav-avatar {
      background: var(--accent);
      color: #fff;
    }

    .nav-username {
      font-size: 0.72rem;
      color: var(--muted);
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-caret {
      font-size: 0.6rem;
      color: var(--muted);
      transition: transform 0.2s;
      display: inline-block;
    }

    .nav-user-btn.open .nav-caret { transform: rotate(180deg); }

    .user-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 160px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: fadeIn 0.15s ease;
      z-index: 200;
    }

    .user-dropdown.open { display: flex; flex-direction: column; }

    .dropdown-item {
      display: block;
      width: 100%;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      text-align: left;
      transition: all 0.12s;
      letter-spacing: 0.04em;
    }

    .dropdown-item:hover { background: var(--surface2); color: var(--text); }
    .dropdown-item.active { color: var(--accent); }
    .dropdown-item.danger:hover { color: var(--danger); background: var(--surface2); }

    .dropdown-sep {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* ─── MAIN ─── */
    main {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .container {
      max-width: 1080px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── BUTTONS ─── */
    .btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 12px 22px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.03em;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn.secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn.ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn.ghost:hover { border-color: var(--accent); color: var(--text); }

    /* ─── FORMS ─── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 4px;
    }

    .form-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: -12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field input,
    .field textarea,
    .field select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
      width: 100%;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus { border-color: var(--accent); }

    .field input::placeholder,
    .field textarea::placeholder { color: var(--muted); }

    .field select option { background: var(--surface2); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

    /* ─── MISC ─── */
    .section-label {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: -8px;
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 0.82rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .tag {
      font-size: 0.68rem;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
      height: fit-content;
    }

    .tag.accent { border-color: var(--accent); color: var(--accent); }
    .tag.green  { border-color: var(--accent2); color: var(--accent2); }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface2);
      border: 1px solid var(--accent2);
      color: var(--accent2);
      font-size: 0.78rem;
      padding: 12px 20px;
      border-radius: 8px;
      z-index: 999;
      animation: slideUp 0.2s ease;
      letter-spacing: 0.03em;
    }

    .toast.error { border-color: var(--danger); color: var(--danger); }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── FIELD VALIDATION ─── */
    .field-error {
      font-size: 0.68rem;
      color: var(--danger);
      display: none;
      margin-top: -2px;
    }

    .field-error.visible { display: block; }

    .field input.invalid,
    .field textarea.invalid,
    .field select.invalid {
      border-color: var(--danger) !important;
    }

    .field input.valid,
    .field textarea.valid {
      border-color: var(--accent2) !important;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<header>
  <a class="logo" href="/">APP<span>L</span>iED</a>
  <nav>
    <!-- shown when authenticated -->
    <div id="nav-auth" style="display:none; align-items:center; gap:4px;">
      <a class="tab {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">dashboard</a>
      <a class="tab {% if request.path == '/browse' %}active{% endif %}" href="/browse">jobs</a>
      <a class="tab {% if request.path == '/tailor' %}active{% endif %}" href="/tailor">tailor</a>
      <a class="tab {% if request.path == '/chat' %}active{% endif %}" href="/chat">agent</a>
      <div class="divider"></div>
      <div class="nav-user-wrapper">
        <button class="nav-user-btn" id="nav-user-btn" onclick="toggleUserMenu(event)" aria-haspopup="true">
          <div class="nav-avatar" id="nav-avatar">?</div>
          <span class="nav-username" id="nav-username">you</span>
          <span class="nav-caret">▾</span>
        </button>
        <div class="user-dropdown" id="user-dropdown">
          <a href="/profile" class="dropdown-item {% if request.path == '/profile' %}active{% endif %}">profile</a>
          <a href="/settings" class="dropdown-item {% if request.path == '/settings' %}active{% endif %}">settings</a>
          <a href="/about" class="dropdown-item {% if request.path == '/about' %}active{% endif %}">about</a>
          <div class="dropdown-sep"></div>
          <button class="dropdown-item danger" onclick="signOut()">sign out</button>
        </div>
      </div>
    </div>
    <!-- shown when NOT authenticated -->
    <div id="nav-unauth" style="display:none;">
      <a class="btn" href="/login" style="font-size:0.78rem; padding:8px 18px;">sign in</a>
    </div>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<script>
  function toast(msg, isError = false) {
    const el = document.createElement('div');
    el.className = 'toast' + (isError ? ' error' : '');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ─── VALIDATION HELPERS ───────────────────────────────────────────────────
  function isValidEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
  }

  function fieldError(inputId, msg) {
    const el  = document.getElementById(inputId);
    const err = document.getElementById('err-' + inputId);
    if (el)  el.classList.add('invalid');
    if (el)  el.classList.remove('valid');
    if (err) { err.textContent = msg; err.classList.add('visible'); }
  }

  function fieldOk(inputId) {
    const el  = document.getElementById(inputId);
    const err = document.getElementById('err-' + inputId);
    if (el)  { el.classList.remove('invalid'); el.classList.add('valid'); }
    if (err) err.classList.remove('visible');
  }

  function fieldReset(inputId) {
    const el  = document.getElementById(inputId);
    const err = document.getElementById('err-' + inputId);
    if (el)  { el.classList.remove('invalid', 'valid'); }
    if (err) err.classList.remove('visible');
  }

  function attachEmailValidation(inputId) {
    const el = document.getElementById(inputId);
    if (!el) return;
    el.addEventListener('blur', () => {
      const v = el.value.trim();
      if (!v) {
        fieldError(inputId, 'this field is required');
      } else if (!isValidEmail(v)) {
        fieldError(inputId, 'enter a valid email address (e.g. ada@example.com)');
      } else {
        fieldOk(inputId);
      }
    });
    el.addEventListener('input', () => {
      if (el.classList.contains('invalid')) fieldReset(inputId);
    });
  }

  function attachRequiredValidation(inputId, msg) {
    const el = document.getElementById(inputId);
    if (!el) return;
    el.addEventListener('blur', () => {
      if (!el.value.trim()) fieldError(inputId, msg || 'this field is required');
      else fieldOk(inputId);
    });
    el.addEventListener('input', () => {
      if (el.classList.contains('invalid')) fieldReset(inputId);
    });
  }
  // ──────────────────────────────────────────────────────────────────────────

  async function signOut() {
    try { await fetch('/auth/logout', { method: 'POST' }); } catch {}
    localStorage.removeItem('applied_user');
    window.location.href = '/login';
  }

  function toggleUserMenu(e) {
    e.stopPropagation();
    const btn = document.getElementById('nav-user-btn');
    const dd  = document.getElementById('user-dropdown');
    const open = dd.classList.contains('open');
    btn.classList.toggle('open', !open);
    dd.classList.toggle('open', !open);
  }

  document.addEventListener('click', function() {
    document.getElementById('nav-user-btn')?.classList.remove('open');
    document.getElementById('user-dropdown')?.classList.remove('open');
  });

  // Pages that require a logged-in account
  const PROTECTED = ['/dashboard', '/browse', '/tailor', '/chat', '/profile', '/settings', '/about'];

  function getLocalUser() {
    try { return JSON.parse(localStorage.getItem('applied_user') || 'null'); } catch { return null; }
  }

  function showAuthNav(name) {
    const initials = name.split(' ').filter(Boolean).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    document.getElementById('nav-avatar').textContent   = initials || '?';
    document.getElementById('nav-username').textContent = name;
    document.getElementById('nav-auth').style.display   = 'flex';
    document.getElementById('nav-unauth').style.display = 'none';
  }

  function showUnauthNav() {
    document.getElementById('nav-auth').style.display   = 'none';
    document.getElementById('nav-unauth').style.display = 'block';
  }

  (function initAuth() {
    const path      = window.location.pathname;
    const isProtected = PROTECTED.some(p => path === p || path.startsWith(p + '/'));
    const user      = getLocalUser();
    const loggedIn  = user && user.user_id && !user.isGuest;

    // immediate redirect — before any content paints
    if (isProtected && !loggedIn) {
      window.location.replace('/login');
      return;
    }

    if (loggedIn) {
      showAuthNav(user.name || user.email || 'you');
    } else {
      showUnauthNav();
    }

    // background session sync — keeps localStorage fresh after a server restart
    fetch('/auth/me').then(r => r.json()).then(data => {
      if (data.status !== 'success') {
        // server says not authenticated — if on protected page, kick out
        if (isProtected) { window.location.replace('/login'); }
        else { showUnauthNav(); }
        return;
      }
      const first = data.first_name || '';
      const last  = data.last_name  || '';
      const name  = [first, last].filter(Boolean).join(' ') || data.email?.split('@')[0] || 'user';
      localStorage.setItem('applied_user', JSON.stringify({
        name, first, last,
        email:   data.email,
        user_id: data.user_id,
        isGuest: false,
      }));
      showAuthNav(name);
    }).catch(() => {
      // network error — leave current nav state as-is
    });
  })();
</script>
{% block scripts %}{% endblock %}

</body>
</html>
